# .github/workflows/release_wrt_all.yml
name: Release WRT - All
run-name: Release All - ${{ github.run_number }}

on:
  workflow_dispatch:
  #自动执行：每周六早上2点
  schedule:
    - cron: 0 18 * * 6

permissions: write-all

env:
  TZ: Asia/Shanghai
  CCACHE_DIR: ./action_build/.ccache
  CCACHE_MAXSIZE: 2G

jobs:

#================================================
# matrix 自动编译所有设备
#================================================

  build:

    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        model:
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - link_nn6000v2_immwrt
          - x64_immwrt

    name: Build ${{ matrix.model }}

    steps:

#------------------------------------------------
# 释放磁盘
#------------------------------------------------
      - name: Free Disk Space
        uses: sbwml/actions@free-disk

#------------------------------------------------
# 系统环境
#------------------------------------------------
      - name: Build Environment
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo apt -y install dos2unix libfuse-dev ccache jq

#------------------------------------------------
# 拉代码
#------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v5

#------------------------------------------------
# 脚本权限
#------------------------------------------------
      - name: Grant execute permission
        run: |
          find . -name "*.sh" -exec chmod +x {} \;

#------------------------------------------------
# 构建时间
#------------------------------------------------
      - name: Build Info
        run: |
          BUILD_DATE=$(date +"%Y.%m.%d_%H.%M")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

#------------------------------------------------
# 预克隆源码
#------------------------------------------------
      - name: Pre Clone
        run: |
          ./wrt_core/pre_clone_action.sh ${{ matrix.model }}

#------------------------------------------------
# cache
#------------------------------------------------
      - name: Cache Build
        uses: actions/cache@v4
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: wrt-${{ matrix.model }}-${{ github.ref_name }}
          restore-keys: |
            wrt-${{ matrix.model }}-
            wrt-

#------------------------------------------------
# Refresh cache
#------------------------------------------------
      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

#------------------------------------------------
# ccache配置
#------------------------------------------------
      - name: Configure ccache
        run: |
          ccache -M $CCACHE_MAXSIZE
          ccache -s || true

#------------------------------------------------
# 编译
#------------------------------------------------
      - name: Build Firmware
        run: |
          ./build.sh ${{ matrix.model }} 2>&1 | tee build.log

#------------------------------------------------
# 上传编译日志
#------------------------------------------------
      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-log-${{ matrix.model }}
          path: build.log

#------------------------------------------------
# 获取内核
#------------------------------------------------
      - name: Kernel Version
        if: success()
        run: |
          KVER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")
          echo "KVER=$KVER" >> $GITHUB_ENV

#------------------------------------------------
# 上传固件
#------------------------------------------------
      - name: Upload Firmware Artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: firmware-${{ matrix.model }}
          path: ./firmware/*.*

#------------------------------------------------
# Release说明
#------------------------------------------------
      - name: Prepare Release Body
        if: success()
        run: |
          PLUGINS=$(grep -h -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest 2>/dev/null \
            | sort -u \
            | paste - - - \
            | awk '{printf "%-28s %-28s %-28s\n",$1,$2,$3}')

          cat > release_body.txt <<EOF
          🚀 ImmortalWrt Cloud Build

          📦 Kernel: ${{ env.KVER }}

          🔧 Default Config
          - WIFI Password: 12345678
          - LAN IP: 10.0.0.1

          🧩 Installed Plugins

          \`\`\`
          $PLUGINS
          \`\`\`
          EOF

#------------------------------------------------
# 发布 Release
#------------------------------------------------
      - name: Release Firmware
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.model }}_${{ env.BUILD_DATE }}
          files: ./firmware/*.*
          body_path: ./release_body.txt

#------------------------------------------------
# 清理旧Release
#------------------------------------------------
      - name: Cleanup Old Releases
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEEP=2
          MODEL="${{ matrix.model }}"

          gh release list --limit 200 --json tagName,publishedAt \
            | jq -r ".[] | select(.tagName | startswith(\"$MODEL\")) | \"\(.publishedAt) \(.tagName)\"" \
            | sort -r \
            | awk "NR>$KEEP {print \$2}" \
            | while read tag; do
                echo "Deleting $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done

#------------------------------------------------
# ccache统计
#------------------------------------------------
      - name: ccache Stats
        if: always()
        run: |
          ccache -s || true

#------------------------------------------------
# 系统信息
#------------------------------------------------
      - name: Machine Info
        if: always()
        run: |
          lscpu | grep -E "Model name|Core|Thread"
          df -h