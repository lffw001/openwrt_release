name: Cleanup Env

on:
  workflow_dispatch:
    inputs:
      cleanup_type:
        required: true
        description: Cleanup Type
        type: choice
        default: all
        options:
          - all
          - cache_only
          - releases_only
          - workflow_runs_only
      model_filter:
        required: false
        description: Model Filter
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:
          - jdcloud_ax6000_immwrt
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - link_nn6000v2_immwrt
          - x64_immwrt
        

permissions:
  actions: write
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      # 清理所有缓存
      - name: Cleanup All Caches
        if: inputs.cleanup_type == 'all' || inputs.cleanup_type == 'cache_only'
        run: |
          echo "=========================================="
          echo "Starting Cache Cleanup"
          echo "=========================================="
          
          # 获取所有缓存
          CACHE_LIST=$(gh cache list --limit 1000 --json key,id,createdAt --jq '.[] | "\(.key)|\(.id)|\(.createdAt)"')
          
          if [ -z "$CACHE_LIST" ]; then
            echo "No caches found."
          else
            TOTAL_CACHE=$(echo "$CACHE_LIST" | wc -l)
            echo "Found $TOTAL_CACHE caches to clean up"
            echo ""
            
            # 按模型过滤
            if [ -n "${{ inputs.model_filter }}" ]; then
              echo "Filtering by model: ${{ inputs.model_filter }}"
              CACHE_LIST=$(echo "$CACHE_LIST" | grep "${{ inputs.model_filter }}")
              FILTERED_COUNT=$(echo "$CACHE_LIST" | wc -l)
              echo "Filtered to $FILTERED_COUNT caches"
              echo ""
            fi
            
            # 删除缓存
            echo "$CACHE_LIST" | while IFS='|' read -r key id created_at; do
              echo "Deleting cache: $key"
              echo "  Created: $created_at"
              gh cache delete "$id" 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
              echo ""
            done
          fi
          
          echo "=========================================="
          echo "Cache Cleanup Complete"
          echo "=========================================="
          gh cache list --limit 10 || echo "No remaining caches"

      # 清理 Release
      - name: Cleanup Releases
        if: inputs.cleanup_type == 'all' || inputs.cleanup_type == 'releases_only'
        run: |
          echo "=========================================="
          echo "Starting Release Cleanup"
          echo "=========================================="
          
          # 获取所有 Release
          RELEASE_LIST=$(gh release list --limit 200 --json tagName,publishedAt --jq '.[] | "\(.tagName)|\(.publishedAt)"')
          
          if [ -z "$RELEASE_LIST" ]; then
            echo "No releases found."
          else
            TOTAL_RELEASES=$(echo "$RELEASE_LIST" | wc -l)
            echo "Found $TOTAL_RELEASES releases"
            echo ""
            
            # 按模型过滤
            if [ -n "${{ inputs.model_filter }}" ]; then
              echo "Filtering by model: ${{ inputs.model_filter }}"
              RELEASE_LIST=$(echo "$RELEASE_LIST" | grep "^${{ inputs.model_filter }}_")
              FILTERED_COUNT=$(echo "$RELEASE_LIST" | wc -l)
              echo "Filtered to $FILTERED_COUNT releases"
              echo ""
            fi
            
            # 删除 Release
            echo "$RELEASE_LIST" | while IFS='|' read -r tag published_at; do
              echo "Deleting release: $tag"
              echo "  Published: $published_at"
              gh release delete "$tag" --yes --cleanup-tag 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
              echo ""
            done
          fi
          
          echo "=========================================="
          echo "Release Cleanup Complete"
          echo "=========================================="
          gh release list --limit 10 || echo "No remaining releases"

      # 清理工作流运行记录
      - name: Cleanup Workflow Runs
        if: inputs.cleanup_type == 'all' || inputs.cleanup_type == 'workflow_runs_only'
        run: |
          echo "=========================================="
          echo "Starting Workflow Run Cleanup"
          echo "=========================================="
          
          # 获取所有已完成的工作流运行
          RUN_LIST=$(gh run list --limit 200 --status completed --json databaseId,createdAt,name --jq '.[] | "\(.databaseId)|\(.createdAt)|\(.name)"')
          
          if [ -z "$RUN_LIST" ]; then
            echo "No workflow runs found."
          else
            TOTAL_RUNS=$(echo "$RUN_LIST" | wc -l)
            echo "Found $TOTAL_RUNS workflow runs"
            echo ""
            
            # 删除工作流运行
            echo "$RUN_LIST" | while IFS='|' read -r run_id created_at run_name; do
              echo "Deleting workflow run: $run_id"
              echo "  Name: $run_name"
              echo "  Created: $created_at"
              gh api -X DELETE repos/${{ github.repository }}/actions/runs/$run_id 2>/dev/null && echo "  ✓ Deleted" || echo "  ✗ Failed"
              echo ""
            done
          fi
          
          echo "=========================================="
          echo "Workflow Run Cleanup Complete"
          echo "=========================================="
          gh run list --limit 10 --status completed || echo "No remaining workflow runs"

      # 清理本地构建产物（如果存在）
      - name: Cleanup Local Build Artifacts
        if: inputs.cleanup_type == 'all'
        run: |
          echo "=========================================="
          echo "Cleaning Local Build Artifacts"
          echo "=========================================="
          
          # 清理固件目录
          if [ -d "./firmware" ]; then
            echo "Removing firmware directory..."
            rm -rf ./firmware/*
            echo "✓ Cleaned firmware directory"
          fi
          
          # 清理编译缓存
          if [ -d "./action_build" ]; then
            echo "Removing action_build directory..."
            rm -rf ./action_build/.ccache
            rm -rf ./action_build/staging_dir
            echo "✓ Cleaned action_build cache"
          fi
          
          # 清理临时文件
          if [ -f "./repo_flag" ]; then
            echo "Removing repo_flag..."
            rm -f ./repo_flag
            echo "✓ Cleaned repo_flag"
          fi
          
          echo "=========================================="
          echo "Local Cleanup Complete"
          echo "=========================================="

      # 输出清理总结
      - name: Cleanup Summary
        if: always()
        run: |
          echo "=========================================="
          echo "CLEANUP SUMMARY"
          echo "=========================================="
          echo "Cleanup Type: ${{ inputs.cleanup_type }}"
          echo "Model Filter: ${{ inputs.model_filter || 'All Models' }}"
          echo "Time: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo ""
          echo "Current Status:"
          echo "  Caches: $(gh cache list --limit 1 2>/dev/null | wc -l) (showing count)"
          echo "  Releases: $(gh release list --limit 1 2>/dev/null | wc -l) (showing count)"
          echo "  Workflow Runs: $(gh run list --limit 1 --status completed 2>/dev/null | wc -l) (showing count)"
          echo "=========================================="
          echo "Cleanup Complete! ✅"
          echo "=========================================="
